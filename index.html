<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prayer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 40%, #24243e 70%, #0f2027 100%);
      cursor: none;
      font-family: Georgia, serif;
      overflow-x: hidden;
    }
    #custom-cursor {
      position: fixed;
      width: 28px; height: 28px;
      background: radial-gradient(circle, #fff 0%, #a78bfa 60%, transparent 100%);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 9999;
      mix-blend-mode: screen;
    }
    #main-text {
      font-size: 72px;
      line-height: 1.35;
      color: rgba(255,255,255,0.88);
      padding: 80px 60px 120px;
      letter-spacing: 0.01em;
      transition: text-shadow 0.6s ease, opacity 3s ease;
      word-wrap: break-word;
    }
    #main-text.fading { opacity: 0; }
    .place-word {
      color: #a78bfa;
      cursor: none;
      border-bottom: 2px dashed rgba(167,139,250,0.5);
      display: inline;
      transition: color 0.2s;
    }
    .place-word:hover { color: #f0abfc; }
    #popup-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    #popup-overlay.active { display: flex; }
    #popup-box {
      background: linear-gradient(160deg, #1e1b4b, #312e81);
      border: 1px solid rgba(167,139,250,0.4);
      border-radius: 16px;
      padding: 36px 40px;
      max-width: 520px;
      width: 90%;
      color: #e0e7ff;
      font-family: Georgia, serif;
      position: relative;
    }
    #popup-place {
      font-size: 14px;
      color: rgba(167,139,250,0.6);
      margin-bottom: 8px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    #popup-prompt {
      font-size: 22px;
      line-height: 1.6;
      color: #c4b5fd;
      margin-bottom: 24px;
      font-style: italic;
    }
    #popup-input {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(167,139,250,0.4);
      border-radius: 10px;
      color: #e0e7ff;
      font-size: 18px;
      padding: 14px 16px;
      outline: none;
      font-family: Georgia, serif;
      resize: none;
      height: 90px;
    }
    #popup-input:focus { border-color: #c0bbd0; }
    #popup-submit {
      margin-top: 16px;
      background: linear-gradient(70deg, #391b6d, #7a0484);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 16px;
      padding: 12px 28px;
      cursor: pointer;
      font-family: Georgia, serif;
      transition: opacity 0.2s;
    }
    #popup-submit:hover { opacity: 0.85; }
    #close-popup {
      position: absolute;
      top: 14px; right: 18px;
      background: none;
      border: none;
      color: rgba(112, 102, 142, 0.7);
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
    }
    #response-count {
      position: fixed;
      bottom: 20px; right: 24px;
      color: rgba(4, 68, 21, 0.5);
      font-size: 14px;
      font-family: Georgia, serif;
      z-index: 500;
    }
  </style>
</head>
<body>

<div id="custom-cursor"></div>
<div id="popup-overlay">
  <div id="popup-box">
    <button id="close-popup">&#x2715;</button>
    <div id="popup-place"></div>
    <div id="popup-prompt"></div>
    <textarea id="popup-input"></textarea>
    <br>
    <button id="popup-submit"></button>
  </div>
</div>
<div id="main-text"></div>
<div id="response-count">0 / 5 transmissions</div>

<script>
const prompts = [
  "The one who made the internet here is ____",
  "Have you been thinking about the wires lately?",
  "Do the servers dream of electric sheep, or just more data?",
  "Are you visiting here when you enter a URL?",
  "There is so much water, should we let the coolers have it?",
  "Web island hotel discount, enter last search to win:"
];

const shadowSets = [
  "-3px -3px 0 red, 3px -3px 0 orange, 6px 0 0 yellow, 3px 3px 0 lime, -3px 3px 0 cyan, -6px 0 0 blue, 0 -6px 0 violet, 0 6px 0 magenta, 8px 8px 12px rgba(255,0,128,0.6), -8px -8px 12px rgba(0,200,255,0.6)",
  "4px 4px 0 #ff6b6b, -4px -4px 0 #4ecdc4, 6px -6px 0 #ffe66d, -6px 6px 0 #a855f7, 0 8px 14px rgba(255,100,0,0.5), 0 -8px 14px rgba(0,255,200,0.5)",
  "5px 0 0 #f43f5e, -5px 0 0 #06b6d4, 0 5px 0 #84cc16, 0 -5px 0 #f59e0b, 7px 7px 10px rgba(244,63,94,0.5), -7px -7px 10px rgba(6,182,212,0.5)",
  "-6px -2px 0 #c026d3, 6px 2px 0 #16a34a, 2px -6px 0 #ea580c, -2px 6px 0 #2563eb, 10px 10px 16px rgba(192,38,211,0.5), -10px -10px 16px rgba(22,163,74,0.5)",
  "-4px -4px 0 #fbbf24, 4px 4px 0 #ec4899, -4px 4px 0 #34d399, 4px -4px 0 #60a5fa, 0 0 20px rgba(251,191,36,0.4), 0 0 40px rgba(236,72,153,0.3)"
];

const rawText = "var simplemaps_usmap_mapdata={ main_settings: { width: 487, background_color: \"#FFFFFF\", background_transparent: \"yes\", border_color: \"#ffffff\", popups: \"detect\", state_description: \"State Description\", state_color: \"#88A4BC\", state_hover_color: \"#3B729F\", state_url: \"\", border_size: 1.5, all_states_inactive: \"no\", all_states_zoomable: \"yes\", location_description: \"Add location markers using latitude and longitude!\", location_color: \"#2041D4\", location_opacity: 0.8, location_hover_opacity: 1, location_url: \"\", location_size: 25, location_type: \"square\", location_image_source: \"frog.png\", location_border_color: \"#FFFFFF\", location_border: 2, location_hover_border: 2.5, all_locations_inactive: \"no\", all_locations_hidden: \"no\", label_color: \"#d5ddec\", label_hover_color: \"#d5ddec\", label_size: 22, label_font: \"Arial\", hide_labels: \"no\", hide_eastern_labels: \"no\", manual_zoom: \"no\", back_image: \"no\", initial_back: \"no\", initial_zoom: -1, initial_zoom_solo: \"no\", region_opacity: 1, region_hover_opacity: 0.6, zoom_out_incrementally: \"yes\", zoom_percentage: 0.99, zoom_time: 0.5, popup_color: \"white\", popup_opacity: 0.9, popup_shadow: 1, popup_corners: 5, popup_font: \"12px/1.5 Verdana, Arial, Helvetica, sans-serif\", popup_nocss: \"no\", div: \"map\", auto_load: \"yes\", url_new_tab: \"yes\", images_directory: \"/static/lib/simplemaps/map_images/\", fade_time: 0.1, import_labels: \"no\", link_text: \"View Website\" }, state_specific: { HI: { name: \"Hawaii\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, AK: { name: \"Alaska\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, FL: { name: \"Florida\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, NH: { name: \"New Hampshire\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, VT: { name: \"Vermont\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, ME: { name: \"Maine\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, RI: { name: \"Rhode Island\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, NY: { name: \"New York\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, PA: { name: \"Pennsylvania\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, NJ: { name: \"New Jersey\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, DE: { name: \"Delaware\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, MD: { name: \"Maryland\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, VA: { name: \"Virginia\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, WV: { name: \"West Virginia\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, OH: { name: \"Ohio\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, IN: { name: \"Indiana\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, IL: { name: \"Illinois\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, CT: { name: \"Connecticut\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, WI: { name: \"Wisconsin\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, NC: { name: \"North Carolina\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, DC: { name: \"District of Columbia\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, MA: { name: \"Massachusetts\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, TN: { name: \"Tennessee\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, AR: { name: \"Arkansas\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, MO: { name: \"Missouri\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, GA: { name: \"Georgia\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, SC: { name: \"South Carolina\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, KY: { name: \"Kentucky\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, AL: { name: \"Alabama\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, LA: { name: \"Louisiana\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, MS: { name: \"Mississippi\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, IA: { name: \"Iowa\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, MN: { name: \"Minnesota\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, OK: { name: \"Oklahoma\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, TX: { name: \"Texas\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, NM: { name: \"New Mexico\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, KS: { name: \"Kansas\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, NE: { name: \"Nebraska\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, SD: { name: \"South Dakota\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, ND: { name: \"North Dakota\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, WY: { name: \"Wyoming\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, MT: { name: \"Montana\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, CO: { name: \"Colorado\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, UT: { name: \"Utah\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, AZ: { name: \"Arizona\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, NV: { name: \"Nevada\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, OR: { name: \"Oregon\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, WA: { name: \"Washington\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, CA: { name: \"California\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, MI: { name: \"Michigan\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" }, ID: { name: \"Idaho\", description: \"default\", color: \"default\", hover_color: \"default\", url: \"default\" } }, locations: { \"0\": { name: \"New York City\", lat: 40.7143528, lng: -74.0059731 }, \"1\": { name: \"Anchorage\", lat: 61.2180556, lng: -149.9002778, color: \"default\" } } }";

let responseCount = 0;
let usedPrompts = [];
let shadowIndex = 0;

function getRandomPrompt() {
  let available = prompts.filter(p => !usedPrompts.includes(p));
  if (available.length === 0) { usedPrompts = []; available = [...prompts]; }
  const pick = available[Math.floor(Math.random() * available.length)];
  usedPrompts.push(pick);
  return pick;
}

function buildText() {
  const container = document.getElementById('main-text');
  const nameRegex = /name:\s*"([^"]+)"/g;
  const markers = {};
  let idx = 0;
  let m;
  while ((m = nameRegex.exec(rawText)) !== null) {
    const fullMatch = m[0];
    const placeName = m[1];
    if (!markers[fullMatch]) {
      markers[fullMatch] = { token: '\x00PLACE' + idx + '\x00', name: placeName };
      idx++;
    }
  }

  let result = rawText;
  Object.keys(markers).forEach(function(match) {
    result = result.split(match).join(markers[match].token);
  });

  result = result.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  Object.values(markers).forEach(function(info) {
    const escapedName = info.name.replace(/&/g,'&amp;');
    const spanHtml = 'name: <span class="place-word" data-place="' + escapedName + '">&quot;' + escapedName + '&quot;</span>';
    result = result.split(info.token).join(spanHtml);
  });

  container.innerHTML = result;

  document.querySelectorAll('.place-word').forEach(function(el) {
    el.addEventListener('click', function() { openPopup(el.dataset.place); });
  });
}

function openPopup(placeName) {
  const prompt = getRandomPrompt();
  document.getElementById('popup-place').textContent = placeName;
  document.getElementById('popup-prompt').textContent = prompt;
  document.getElementById('popup-input').value = '';
  document.getElementById('popup-overlay').classList.add('active');
}

document.getElementById('close-popup').addEventListener('click', function() {
  document.getElementById('popup-overlay').classList.remove('active');
});

document.getElementById('popup-submit').addEventListener('click', function() {
  const val = document.getElementById('popup-input').value.trim();
  if (!val) return;
  document.getElementById('popup-overlay').classList.remove('active');
  responseCount++;
  document.getElementById('response-count').textContent = responseCount + ' / 5 transmissions';

  shadowIndex = (shadowIndex + 1) % shadowSets.length;
  document.getElementById('main-text').style.textShadow = shadowSets[shadowIndex];

  if (responseCount >= 5) {
    setTimeout(function() {
      document.getElementById('main-text').classList.add('fading');
      setTimeout(function() {
        window.location.href = 'badgraph.html';
      }, 3000);
    }, 400);
  }
});

document.getElementById('popup-overlay').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('active');
});

const cursor = document.getElementById('custom-cursor');
document.addEventListener('mousemove', function(e) {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});

buildText();
</script>
</body>
</html>
