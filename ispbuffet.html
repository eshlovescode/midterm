<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>.</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width:100vw; height:100vh;
  overflow:hidden;
  background:#f0ebe0;
  cursor:none;
  font-family:'Courier New', monospace;
}
#cursor {
  position:fixed;
  pointer-events:none;
  z-index:9999;
  transform:translate(-50%,-50%);
}
.floater {
  position:absolute;
  cursor:none;
  user-select:none;
  mix-blend-mode:multiply;
  opacity:0.7;
}
#drop-ring {
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:180px; height:180px;
  border-radius:50%;
  border:1px solid rgba(60,40,20,0.3);
  background:rgba(255,252,240,0.4);
  z-index:10;
  pointer-events:none;
}
#done-btn {
  position:fixed;
  bottom:24px; right:24px;
  z-index:500;
  background:none;
  border:1px solid rgba(60,40,20,0.3);
  color:rgba(60,40,20,0.4);
  font-family:'Courier New', monospace;
  font-size:12px;
  letter-spacing:2px;
  padding:6px 12px;
  cursor:none;
}
#done-btn:hover {
  color:rgba(60,40,20,0.8);
  border-color:rgba(60,40,20,0.7);
}
#counter {
  position:fixed;
  bottom:28px; left:24px;
  font-size:32px;
  font-weight:bold;
  color:rgba(60,40,20,0.18);
  pointer-events:none;
  font-family:'Courier New', monospace;
}
#total-cost {
  position:fixed;
  top:22px; right:24px;
  font-size:14px;
  font-weight:bold;
  color:rgba(60,40,20,0.28);
  pointer-events:none;
  font-family:'Courier New', monospace;
  letter-spacing:1px;
}
#total-cost {
  position:fixed;
  top:20px; right:24px;
  font-size:15px;
  font-weight:bold;
  color:rgba(60,40,20,0.28);
  pointer-events:none;
  font-family:'Courier New', monospace;
  letter-spacing:1px;
}
</style>
</head>
<body>

<div id="cursor">
  <svg width="28" height="28" viewBox="0 0 16 16" style="image-rendering:pixelated">
    <rect x="3" y="0" width="1" height="4" fill="#4a3820"/>
    <rect x="7" y="0" width="1" height="3" fill="#4a3820"/>
    <rect x="11" y="0" width="1" height="4" fill="#4a3820"/>
    <rect x="1" y="4" width="14" height="7" rx="1" fill="#4a3820"/>
    <rect x="3" y="6" width="2" height="2" fill="#a8b89a"/>
    <rect x="6" y="6" width="2" height="2" fill="#c9b99a"/>
    <rect x="9" y="6" width="2" height="2" fill="#a8b89a"/>
    <rect x="5" y="11" width="6" height="2" fill="#2e2412"/>
  </svg>
</div>

<div id="drop-ring"></div>
<div id="counter">0</div>
<div id="total-cost">$0.00</div>
<button id="done-btn">Done?</button>

<script>
const rand  = (a,b) => Math.random()*(b-a)+a;
const randI = (a,b) => Math.floor(rand(a,b+1));
const pick  = a => a[randI(0,a.length-1)];

const COLORS = ['#c17c74','#7a9e7e','#d4a853','#8e7bb5','#8fada8','#c9956c','#b5c4b1','#d49878','#9c8cac'];
const NS = 'http://www.w3.org/2000/svg';

let consumed = 0;
let totalCost = 0;
let dragging = null;
let offX = 0, offY = 0;

// cursor
const cur = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cur.style.left = e.clientX + 'px';
  cur.style.top  = e.clientY + 'px';
});

function makeShape() {
  const color = pick(COLORS);
  const size  = randI(30, 70);
  const type  = randI(0, 3);
  const svg   = document.createElementNS(NS, 'svg');
  svg.setAttribute('width', size);
  svg.setAttribute('height', size);
  svg.setAttribute('viewBox', '0 0 100 100');

  let el;
  if (type === 0) {
    el = document.createElementNS(NS, 'circle');
    el.setAttribute('cx','50'); el.setAttribute('cy','50'); el.setAttribute('r','46');
  } else if (type === 1) {
    el = document.createElementNS(NS, 'rect');
    el.setAttribute('x','4'); el.setAttribute('y','4');
    el.setAttribute('width','92'); el.setAttribute('height','92');
    el.setAttribute('rx', randI(0,20));
  } else if (type === 2) {
    el = document.createElementNS(NS, 'polygon');
    el.setAttribute('points','50,6 94,88 6,88');
  } else {
    el = document.createElementNS(NS, 'polygon');
    el.setAttribute('points','50,4 96,50 50,96 4,50');
  }
  el.setAttribute('fill', color);
  svg.appendChild(el);

  const div = document.createElement('div');
  div.className = 'floater';
  div.style.left = rand(40, window.innerWidth  - 120) + 'px';
  div.style.top  = rand(40, window.innerHeight - 120) + 'px';
  div.style.transform = `rotate(${rand(-30,30)}deg)`;
  div.appendChild(svg);
  document.body.appendChild(div);

  div.dataset.cost = rand(0.99, 59.99).toFixed(2);
  div.addEventListener('mousedown', e => grab(e, div));
  div.addEventListener('touchstart', e => grabTouch(e, div), {passive:false});
}

function grab(e, div) {
  e.preventDefault();
  dragging = div;
  const r = div.getBoundingClientRect();
  offX = e.clientX - r.left;
  offY = e.clientY - r.top;
  div.style.zIndex = 100;

  const mv = e => {
    div.style.left = (e.clientX - offX) + 'px';
    div.style.top  = (e.clientY - offY) + 'px';
  };
  const up = e => {
    checkDrop(e.clientX, e.clientY, div);
    div.style.zIndex = '';
    dragging = null;
    window.removeEventListener('mousemove', mv);
    window.removeEventListener('mouseup', up);
  };
  window.addEventListener('mousemove', mv);
  window.addEventListener('mouseup', up);
}

function grabTouch(e, div) {
  e.preventDefault();
  const t = e.touches[0];
  const r = div.getBoundingClientRect();
  offX = t.clientX - r.left;
  offY = t.clientY - r.top;
  div.style.zIndex = 100;

  const mv = e => {
    const tc = e.touches[0];
    div.style.left = (tc.clientX - offX) + 'px';
    div.style.top  = (tc.clientY - offY) + 'px';
  };
  const up = e => {
    const tc = e.changedTouches[0];
    checkDrop(tc.clientX, tc.clientY, div);
    div.style.zIndex = '';
    window.removeEventListener('touchmove', mv);
    window.removeEventListener('touchend', up);
  };
  window.addEventListener('touchmove', mv, {passive:false});
  window.addEventListener('touchend', up);
}

function checkDrop(cx, cy, div) {
  const ring = document.getElementById('drop-ring');
  const r    = ring.getBoundingClientRect();
  const dist = Math.hypot(cx - (r.left + 90), cy - (r.top + 90));
  if (dist < 90) {
    div.remove();
    consumed++;
    totalCost += parseFloat(div.dataset.cost);
    document.getElementById('counter').textContent = consumed;
    document.getElementById('total-cost').textContent = '$' + totalCost.toFixed(2);
    setTimeout(makeShape, 600);
  }
}

// done
document.getElementById('done-btn').addEventListener('click', () => {
  window.location.href = 'index.html';
});

// init
for (let i = 0; i < 10; i++) makeShape();
</script>
</body>
</html>
