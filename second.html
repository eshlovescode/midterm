      { "id": "9.9.9.9",     "value": 78,  "fill": "#888780", "height": 48 },
      { "id": "4.4.4.4",     "value": 72,  "fill": "#888780", "height": 46 }
    ],
    "edges": [
      { "from": "10.0.0.1",    "to": "10.0.0.2",    "latency": 5  },
      { "from": "10.0.0.1",    "to": "10.0.0.3",    "latency": 8  },
      { "from": "10.0.0.2",    "to": "172.16.0.1",  "latency": 12 },
      { "from": "10.0.0.3",    "to": "172.16.0.2",  "latency": 15 },
      { "from": "172.16.0.1",  "to": "172.16.0.2",  "latency": 6  },
      { "from": "172.16.0.1",  "to": "172.16.0.3",  "latency": 9  },
      { "from": "172.16.0.2",  "to": "192.168.1.1", "latency": 20 },
      { "from": "172.16.0.3",  "to": "192.168.1.2", "latency": 18 },

      { "from": "4.4.4.4",     "to": "10.0.0.1",    "latency": 40 },
      { "from": "8.8.8.8",     "to": "172.16.0.1",  "latency": 50 },
      { "from": "1.1.1.1",     "to": "192.168.2.1", "latency": 45 },
      { "from": "9.9.9.9",     "to": "203.0.113.3", "latency": 38 }
    ]
  };

  var chart = anychart.graph(data);

  var nodes = chart.nodes();
  nodes.labels().enabled(true);
  nodes.labels().fontSize(11);
  nodes.labels().fontColor("#222222");
  nodes.tooltip().useHtml(true);
  nodes.tooltip().format(function(e) {
    var id = e.getData("id");
    var value = e.getData("value");
    return '<b>' + id + '</b><br>Bandwidth: <b>' + value + ' Mbps</b>';
  });

  var edges = chart.edges();
  edges.stroke("#5DCAA5", 2, "8 4");
  edges.tooltip().useHtml(true);
  edges.tooltip().format(function(e) {
    var from = e.getData("from");
    var to = e.getData("to");
    var latency = e.getData("latency");
    return 'From <b>' + from + '</b><br>To <b>' + to + '</b><br>Latency: <b>' + latency + ' ms</b>';
  });

  chart.listen("edgeClick", function(e) {
    var edge = e.edge;
    var currentStroke = edge.stroke();
    var isPurple = currentStroke && (
      (typeof currentStroke === "string" && currentStroke.indexOf("7F77DD") !== -1) ||
      (typeof currentStroke === "object" && currentStroke.color && currentStroke.color.indexOf("7F77DD") !== -1)
    );
    if (isPurple) {
      edge.stroke("#5DCAA5", 2, "8 4");
    } else {
      edge.stroke("#7F77DD", 3, "");
    }
  });

  chart.title().text("Internet Network Graph");
  chart.title().fontSize(18);
  chart.container("container");
  chart.draw();
});
</script>
